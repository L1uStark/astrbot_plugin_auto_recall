name: astrbot_plugin_auto_recall
desc: 自动撤回机器人自身消息，支持撤回延迟、关键词过滤和群白名单
author: YourName
version: 1.1.0
config:
  - name: recall_delay
    type: string
    default: "0.1"
    desc: 撤回前等待的秒数
  - name: keywords
    type: string
    default: ""
    desc: 触发撤回的关键词，多个用逗号分隔，空表示全部撤回
  - name: group_whitelist
    type: string
    default: ""
    desc: 群白名单，多个群号用逗号分隔，空表示所有群生效
