name: astrbot_plugin_auto_recall
desc: 自动撤回机器人自身消息，支持撤回延迟、关键词过滤和群白名单
author:L1uStark
version: 1.1.0
config:
  - name: recall_delay
    type: float
    default: 10
    desc: 撤回前等待的秒数
  - name: keywords
    type: list
    default: []
    desc: 触发撤回的关键词列表，空列表表示所有消息都撤回
  - name: group_whitelist
    type: list
    default: []
    desc: 启用撤回的群号白名单，空列表表示所有群和私聊均生效
