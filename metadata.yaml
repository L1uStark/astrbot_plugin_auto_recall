name: astrbot_plugin_auto_recall # 插件名，需与目录名一致
desc: 一个自动撤回机器人自身消息的插件 # 简短描述
author: L1uStark
version: 1.0.0 # 插件版本号
config:
  recall_delay:
    type: float
    default: 0.1
    desc: 撤回延迟（秒）
  keywords:
    type: list
    default: []
    desc: 关键词列表，仅当消息包含关键词时才撤回（空列表表示所有消息都撤回）
  group_whitelist:
    type: list
    default: []
    desc: 群白名单，仅在这些群中启用撤回功能（空列表表示所有群）
